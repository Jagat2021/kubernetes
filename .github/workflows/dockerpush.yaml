name: Build and Deploy to Docker Hub and Kubernetes
on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: jagatpradhan/devops-pub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/weather
          file: ./apps/weather/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: update image tag in Kubernetes deployment
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | cut -d ':' -f2)
          sed -i "s|image: $IMAGE_NAME:.*|image: $IMAGE_NAME:$TAG|g" apps/deployment.yaml
          echo "Updated deployment.yaml with tag: $TAG"

      - name: commit and push updated deployment.yaml
        env:
          GH_ACTION_TOKEN: ${{ secrets.GH_ACTION_TOKEN }}

        run: |
            git config user.name "jagat2021"
            git remote set-url origin https://x-access-token:${GH_ACTION_TOKEN}@github.com/${{ github.repository }}
            git add apps/deployment.yaml
            git commit -m "Update the deployment.yaml with new image tag"
            git push origin main
            

