apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-webapp
  labels:
    app: fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: python-webapp
        image: jagatpradhan/devops-pub:main
        ports:
          - containerPort: 8081
        args: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8081"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
